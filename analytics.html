<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Analytics | BW Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">
    <nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="text-xl font-black">BW <span class="text-blue-400">CONNECT</span></div>
    <div class="flex gap-8 text-xs font-bold uppercase tracking-widest">
        <a href="feed.html" class="hover:text-blue-400 transition">Dashboard</a>
        <a href="project.html" class="hover:text-blue-400 transition">Projekte</a>
        <a href="roadmap.html" class="hover:text-blue-400 transition">Roadmap</a>
        <a href="rewards.html" class="hover:text-blue-400 transition">Rewards</a>
        <a href="profile.html" class="hover:text-blue-400 transition">Profil</a>
    </div>
</nav>

    <main class="max-w-7xl mx-auto p-8">
        <h1 class="text-3xl font-black mb-8">Innovation Pipeline Analytics</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="glass-card p-6 rounded-3xl border-t-4 border-blue-500">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-4">Technologie-Reife</h3>
                <div class="flex items-end gap-2 h-24">
                    <div class="flex-1 bg-slate-100 h-[30%] rounded-t-lg"></div>
                    <div class="flex-1 bg-blue-500 h-[80%] rounded-t-lg shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                    <div class="flex-1 bg-slate-100 h-[50%] rounded-t-lg"></div>
                </div>
                <p class="text-[10px] mt-4 text-slate-500 font-bold uppercase">Fokus: Schlüssel-Technologien</p>
            </div>

            <div class="glass-card p-6 rounded-3xl border-t-4 border-green-500">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-4">Projekt-Durchlauf</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-xs"><span>Ideas</span> <span class="font-bold">142</span></div>
                    <div class="w-full bg-slate-100 h-2 rounded-full"><div class="bg-green-500 w-full h-full rounded-full"></div></div>
                    <div class="flex justify-between text-xs"><span>Prototypes</span> <span class="font-bold">12</span></div>
                    <div class="w-full bg-slate-100 h-2 rounded-full"><div class="bg-green-500 w-[20%] h-full rounded-full"></div></div>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl border-t-4 border-purple-500">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-4">Team-Heterogenität</h3>
                <p class="text-2xl font-black text-slate-800">84%</p>
                <p class="text-[10px] text-slate-500">Mix aus Offizieren, Uffz & Zivilisten</p>
                <div class="mt-4 flex gap-1">
                    <div class="h-2 w-8 bg-purple-500 rounded-full"></div>
                    <div class="h-2 w-12 bg-purple-300 rounded-full"></div>
                    <div class="h-2 w-4 bg-purple-200 rounded-full"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
