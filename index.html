<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login | BW Innovation Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

    <div class="max-w-md w-full p-8 glass-card rounded-3xl z-10 bg-white/10 border border-white/20 backdrop-blur-xl">
        <div class="text-center mb-10">
            <div class="text-3xl font-black text-white tracking-tighter">BW <span class="text-blue-400">CONNECT</span></div>
            <p class="text-slate-300 text-sm mt-2 font-medium">Innovationsplattform der Bundeswehr</p>
        </div>

        <div class="space-y-4">
            <button onclick="location.href='feed.html'" class="w-full py-4 btn-primary text-white rounded-xl font-bold flex items-center justify-center gap-3 shadow-lg hover:shadow-blue-500/30 transition-all">
                Login via Intranet / PKI
            </button>
            
            <button onclick="location.href='feed.html'" class="w-full py-4 bg-white/5 border-2 border-white/10 text-white rounded-xl font-bold hover:bg-white/10 transition-all">
                Smartcard Login
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-white/10 text-center space-y-2">
            <span class="inline-block px-2 py-1 bg-red-500/20 text-red-300 text-[10px] font-black rounded uppercase tracking-widest">VS-NfD Zugelassen</span>
            <p class="text-xs text-slate-400">Hybrider Zugriff für Dienststelle und Home-Office aktiviert.</p>
        </div>
    </div>
</body>
</html>
