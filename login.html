<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login | BW Innovation Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="max-w-md w-full p-8 glass-card rounded-3xl">
        <div class="text-center mb-10">
            <div class="text-3xl font-black text-slate-800 tracking-tighter">BW <span class="text-blue-600">CONNECT</span></div>
            <p class="text-slate-500 text-sm mt-2">Innovationsplattform der Bundeswehr</p>

        <div class="space-y-4">
            <button onclick="location.href='feed.html'" class="w-full py-4 btn-primary text-white rounded-xl font-bold flex items-center justify-center gap-3">
                <span>Login via Intranet / PKI</span>
            </button>
            
            <button onclick="location.href='feed.html'" class="w-full py-4 border-2 border-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition">
                Smartcard Login
            </button>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">Hybrider Zugriff für Dienststelle und Home-Office aktiviert.</p>
        </div>
