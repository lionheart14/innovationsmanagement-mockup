<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Feedback | BW Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">
    <nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="text-xl font-black">BW <span class="text-blue-400">CONNECT</span></div>
    <div class="flex gap-8 text-xs font-bold uppercase tracking-widest">
        <a href="feed.html" class="hover:text-blue-400 transition">Dashboard</a>
        <a href="project.html" class="hover:text-blue-400 transition">Projekte</a>
        <a href="roadmap.html" class="hover:text-blue-400 transition">Roadmap</a>
        <a href="rewards.html" class="hover:text-blue-400 transition">Rewards</a>
        <a href="profile.html" class="hover:text-blue-400 transition">Profil</a>
    </div>
</nav>

    <main class="max-w-2xl mx-auto p-8 text-center">
        <div class="glass-card p-10 rounded-3xl">
            <h1 class="text-3xl font-black mb-4">Deine Meinung zählt</h1>
            <p class="text-slate-500 mb-10">Hilf uns, die Innovationskultur in der Bundeswehr zu verbessern.</p>

            <div class="space-y-8 text-left">
                <div>
                    <p class="font-bold text-sm mb-4">Wie einfach war die Bedienung?</p>
                    <div class="flex justify-between gap-2">
                        <button class="flex-1 py-3 border rounded-xl hover:bg-blue-50 transition">1</button>
                        <button class="flex-1 py-3 border rounded-xl hover:bg-blue-50 transition">2</button>
                        <button class="flex-1 py-3 border rounded-xl hover:bg-blue-50 transition">3</button>
                        <button class="flex-1 py-3 border rounded-xl bg-blue-600 text-white font-bold">4</button>
                        <button class="flex-1 py-3 border rounded-xl hover:bg-blue-50 transition">5</button>
                    </div>
                </div>

                <div>
                    <label class="block font-bold text-sm mb-2">Was können wir besser machen?</label>
                    <textarea class="w-full border p-4 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" rows="4"></textarea>
                </div>

                <button onclick="alert('Vielen Dank für dein Feedback!'); location.href='feed.html'" class="w-full py-4 btn-primary text-white rounded-xl font-bold">Feedback absenden</button>
            </div>
        </div>
    </main>
</body>
</html>
